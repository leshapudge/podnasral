# Render Blueprint — бесплатный Web + PostgreSQL
# https://dashboard.render.com/select-repo?type=blueprint
databases:
  - name: strimkraft-db
    plan: free
    databaseName: strimkraft
    user: strimkraft

services:
  - type: web
    name: strimkraft
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run db:seed && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: strimkraft-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: AUTH_TWITCH_ID
        sync: false
      - key: AUTH_TWITCH_SECRET
        sync: false
      - key: STREAMER_TWITCH_LOGINS
        sync: false
      - key: ADMIN_TWITCH_IDS
        sync: false
      - key: ADMIN_TWITCH_LOGINS
        sync: false
      - key: RAWG_API_KEY
        sync: false
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: CRON_SECRET
        generateValue: true
